services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bazar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bazar_secret}
      POSTGRES_DB: bazar_digital
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazar -d bazar_digital"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/code/uploads
    command: >
      sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --access-logfile -"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
